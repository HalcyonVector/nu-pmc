name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  # ── Gate: run the jest suite + module-boundary check on every push.
  #    Uses a GitHub-hosted runner with the DB mocked (no infra needed), so it
  #    is fast and self-contained. The deploy job below only runs if this passes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci
      # Module-boundary check is informational only (there is pre-existing,
      # accepted debt — modules importing system/routes/sse directly). It
      # reports but does not block the deploy.
      - run: npm run lint:boundaries
        continue-on-error: true

  deploy:
    needs: test            # ← deploy is blocked unless `test` is green
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2, pull, install, restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/nu-pmc
            git pull origin main
            npm install --production
            pm2 restart all

# ── NOT run here (need a live MySQL + running server): the DB-integration
#    harness (tests/modules, `npm run test:integration`) and the Playwright
#    e2e suite (tests/e2e, `npm run test:e2e`). Those belong against a staging
#    environment — see .github/workflows/integration.yml (manual trigger).
