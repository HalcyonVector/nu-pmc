name: Integration + E2E (real DB)

# Runs the layers that npm test (jest, mocked DB) does NOT:
#   - tests/modules/  — DB-integration harness: boots the real server.js against
#     a real MySQL and drives full multi-step flows over HTTP. It bootstraps its
#     own 'test_' users (01-setup inserts test_principal, then creates the rest
#     via the API), so it only needs a schema + config-seeded database.
#   - tests/e2e/      — Playwright browser tests (best-effort; see notes below).
#
# Kept separate from deploy.yml on purpose: it needs a MySQL service and is
# slower, so it informs but does not block deploys yet. Once it's proven stable
# on your data, add `needs: integration` to the deploy job to gate on it too.

on:
  workflow_dispatch:        # run manually from the Actions tab
  push:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nu_pmc
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=15

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: nu_pmc
      # server.js refuses to boot without a >=32-char session secret.
      SESSION_SECRET: ci-integration-session-secret-min-32-chars
      # Real flows (not the dev-login shortcut); keep notifications off so no
      # external calls are attempted during the harness.
      # development avoids the production OIDC-secret boot guard and the
      # NODE_ENV=test auth bypass; real /api/auth/login still works normally.
      NODE_ENV: development
      FORCE_HTTPS: ''
      NOTIFICATIONS: disabled
      MATRIX_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -uroot -proot --silent && break
            echo "waiting for mysql ($i)"; sleep 2
          done

      - name: Load schema + config seed (full install)
        run: |
          # Strip DEFINER clauses — the CI root@% user can't assign them.
          sed 's/DEFINER=[^ ]* //g' nu-pmc-install-20260502.sql > /tmp/install.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -proot nu_pmc < /tmp/install.sql

      - name: Run DB-integration harness (tests/modules)
        run: npm run test:integration

  # ── E2E is best-effort: it needs the app running, seeded login users with the
  #    NuPMC@2026 password, and Playwright browsers. It is allowed to fail so it
  #    reports signal without blocking. Harden it once the selectors/users are
  #    confirmed against your seed, then drop continue-on-error.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: integration

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nu_pmc
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=15

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: nu_pmc
      SESSION_SECRET: ci-e2e-session-secret-min-32-characters
      # development avoids the production OIDC-secret boot guard and the
      # NODE_ENV=test auth bypass; real /api/auth/login still works normally.
      NODE_ENV: development
      PORT: '3100'
      NOTIFICATIONS: disabled
      MATRIX_DISABLED: '1'
      E2E_BASE_URL: http://localhost:3100

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Load schema + config seed
        run: |
          sed 's/DEFINER=[^ ]* //g' nu-pmc-install-20260502.sql > /tmp/install.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -proot nu_pmc < /tmp/install.sql

      - name: Set all login passwords to the e2e test password
        run: |
          node -e "const b=require('bcryptjs'),m=require('mysql2/promise');(async()=>{const c=await m.createConnection({host:'127.0.0.1',port:3306,user:'root',password:'root',database:'nu_pmc'});await c.query('UPDATE users SET password_hash=?, force_password_change=0',[b.hashSync('NuPMC@2026',10)]);await c.end();console.log('passwords set');})();"

      - name: Start the app
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3100/health && break
            echo "waiting for app ($i)"; sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e
