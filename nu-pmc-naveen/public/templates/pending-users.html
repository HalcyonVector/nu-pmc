<!-- public/templates/pending-users.html -->
<!-- Alpine component: pending-users (see public/js/components/pending-users.js) -->

<div class="section-header">Pending User Approvals</div>

<template x-if="loading">
  <div class="loading-spinner">Loading…</div>
</template>

<template x-if="!loading && !hasPending">
  <div class="empty-state">No pending approvals</div>
</template>

<template x-for="u in pending" :key="u.id">
  <div class="card" style="margin-bottom:8px;border-left:4px solid #C8A040">
    <div style="padding:12px">
      <div style="font-weight:bold;font-size:15px" x-text="u.full_name"></div>
      <div style="font-size:12px;color:#666">
        @<span x-text="u.username"></span> · <span x-text="formatRole(u.role)"></span> · <span x-text="u.stream"></span>
      </div>
      <div style="font-size:11px;color:#888;margin-top:2px">
        Requested by <span x-text="u.initiated_by_name"></span> · <span x-text="formatDate(u.initiated_at)"></span>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1" @click="approve(u.id)"
                :disabled="busyIds.has(u.id)">
          <span x-text="busyIds.has(u.id) ? '…' : '✓ Approve'"></span>
        </button>
        <button class="btn-sm" style="flex:1;color:#C87060" @click="reject(u.id)"
                :disabled="busyIds.has(u.id)">
          ✗ Reject
        </button>
      </div>
    </div>
  </div>
</template>

<button x-show="canInitiate" class="btn-primary" @click="openInitiate()"
        style="width:100%;margin-top:8px">
  + Add New Team Member
</button>
