<!-- public/templates/profile.html -->
<!-- Alpine component: profile (see public/js/components/profile.js) -->

<template x-if="loading">
  <div class="loading-spinner">Loading…</div>
</template>

<template x-if="!loading && user">
  <div>
    <div class="section-header">My Profile</div>

    <!-- Identity card -->
    <div class="card">
      <div style="padding:12px">
        <div style="font-size:18px;font-weight:bold;color:#1D3D62" x-text="user.full_name"></div>
        <div style="font-size:13px;color:#666;margin-top:4px">
          <span x-text="roleLabel"></span> · <span x-text="streamLabel"></span>
        </div>
        <div style="font-size:12px;color:#888;margin-top:8px" x-text="user.email"></div>
        <div style="font-size:12px;color:#888" x-text="user.phone || ''"></div>
      </div>
    </div>

    <!-- Change password button -->
    <div class="card" style="margin-top:8px">
      <div style="padding:10px">
        <button class="btn-primary" @click="APP.showForceChangePassword()" style="width:100%">
          Change Password
        </button>
      </div>
    </div>

    <!-- Deputy assignment -->
    <div class="card" style="margin-top:8px" x-show="showDeputyCard">
      <div class="card-title">Deputy Assignment</div>
      <div style="padding:10px;font-size:13px;color:#666">
        When you are unavailable, your deputy can sign Change Notices on your behalf.
      </div>
      <div style="padding:0 10px 10px">
        <select x-model="deputySelected" style="width:100%;padding:8px;margin-bottom:8px">
          <option value="">-- No deputy set --</option>
          <template x-for="u in deputyOptions" :key="u.id">
            <option :value="u.id" x-text="u.full_name + ' (' + u.role + ')'"></option>
          </template>
        </select>
        <button class="btn-primary" @click="saveDeputy()" :disabled="savingDeputy" style="width:100%">
          <span x-text="savingDeputy ? 'Saving…' : (user.deputy_id ? 'Update Deputy' : 'Set Deputy')"></span>
        </button>
        <button class="btn-sm" @click="removeDeputy()" x-show="user.deputy_id"
                style="width:100%;margin-top:6px;color:#C87060">
          Remove Deputy
        </button>
      </div>
    </div>

    <!-- Leave request (site managers only) -->
    <div class="card" style="margin-top:8px" x-show="showLeaveCard">
      <div class="card-title">Request Leave</div>
      <div style="padding:10px">
        <div class="field">
          <label>From Date</label>
          <input type="date" x-model="leaveFrom">
        </div>
        <div class="field">
          <label>To Date</label>
          <input type="date" x-model="leaveTo">
        </div>
        <div class="field">
          <label>Reason (optional)</label>
          <input x-model="leaveReason" placeholder="e.g. Family function">
        </div>
        <button class="btn-primary" @click="requestLeave()" :disabled="requestingLeave" style="width:100%">
          <span x-text="requestingLeave ? 'Submitting…' : 'Request Leave'"></span>
        </button>
      </div>
    </div>
  </div>
</template>
