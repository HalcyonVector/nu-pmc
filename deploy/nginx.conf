# nginx reverse proxy for nu PMC v4
# Put this at /etc/nginx/conf.d/nu-pmc.conf
# After deploy, run: sudo certbot --nginx -d pmc.nuassociates.com
# (certbot will add the ssl_certificate lines automatically)

upstream nu_pmc_app {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 80;
    server_name pmc.nuassociates.com;  # REPLACE with actual domain

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name pmc.nuassociates.com;  # REPLACE

    # Certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/pmc.nuassociates.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pmc.nuassociates.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploads: 20 MB limit (drawings can be large PDFs)
    client_max_body_size 20M;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Proxy to the Node app
    location / {
        proxy_pass http://nu_pmc_app;
        proxy_http_version 1.1;

        # Required for sessions and WebSocket upgrades
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        # PWA caches resources — let the app control cache headers
        proxy_cache_bypass $http_upgrade;
    }

    # NOTE: /uploads/ is NOT served directly by nginx.
    # All upload access goes through the authenticated Node.js route:
    #   GET /api/files/:subdir/:filename  (requires valid session)
    # Serving uploads directly here would bypass authentication and expose
    # drawings, documents, and photos to unauthenticated requests.
    # The Node app handles its own cache headers for /api/files/ responses.

    # Gzip text responses
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;

    # Access + error logs
    access_log /var/log/nginx/nu-pmc-access.log;
    error_log  /var/log/nginx/nu-pmc-error.log;
}
